<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- Define monospace font. -->
 <match target="pattern">
   <test qual="any" name="family"><string>monospace</string></test>
   <edit name="family" mode="prepend" binding="strong"><string>VictorMono Nerd Font</string></edit>
 </match>

 <!-- Define fallback fonts for symbols. -->
 <alias>
  <family>monospace</family>
  <prefer>
   <family>Font Awesome 5 Free</family>
   <family>Font Awesome 5 Solid</family>
   <family>Font Awesome 5 Brands</family>
   <family>Symbola</family>
  </prefer>
 </alias>

 <!-- Set Japanese font. -->
 <match>
  <test compare="contains" name="lang">
   <string>ja</string>
  </test>
  <edit mode="prepend" name="family">
   <string>M+ 1c</string>
  </edit>
 </match>

<!-- Set hinting. -->
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>

 <!-- <!-\- Set everything to use monospace. -\-> -->
 <!-- <match> -->
 <!--  <edit mode="prepend" name="family"> -->
 <!--   <string>monospace</string> -->
 <!--  </edit> -->
 <!-- </match> -->
</fontconfig>
